<body class="page-cv">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header" data-site-header></header>

  <main id="main-content" class="site-main container">
    <section id="cv-summary" class="page-section cv-hero stack" data-reveal>
      <p class="eyebrow">Digital CV</p>
      <h1>Junaid Asghar</h1>
      <p class="cv-hero__summary" data-cv-summary></p>
      <div class="cv-hero__actions">

    <section id="cv-core" class="page-section cv-core-grid" data-reveal>
      <article class="card stack" aria-labelledby="skills-title">
        <p class="eyebrow">Skills</p>
        <h2 id="skills-title">Core stack</h2>
        <ul class="tag-list" data-cv-tools></ul>
      </article>

      <article class="card stack" aria-labelledby="education-title">
        <p class="eyebrow">Education</p>
        <h2 id="education-title">Academic background</h2>
        <div class="cv-education-list" data-cv-education></div>
      </article>
    </section>

    <section id="cv-projects" class="page-section stack" data-reveal>
      <div class="section-header">
        <p class="eyebrow">Selected projects</p>
        <h2>Focused project highlights</h2>
      </div>
      <div class="cv-project-grid" data-cv-projects></div>
    </section>

    <section id="cv-links" class="page-section stack" data-reveal>
      <div class="section-header">
        <p class="eyebrow">Links</p>
        <h2>Contact and profiles</h2>
      </div>
      <ul class="cv-link-list" data-cv-links></ul>
